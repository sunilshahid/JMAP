workflows:
  android-debug:
    name: Build Android APK
    instance_type: mac_mini_m2
    scripts:
      - name: Create fake .env file to bypass build error
        script: echo "GEMINI_API_KEY=dummy_key" > .env
      - name: Generate specific Gradle Wrapper version
        script: gradle wrapper --gradle-version 9.3.1
      - name: Make Gradle executable
        script: chmod +x gradlew
      - name: Build Debug APK
        script: ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/**/*.apk
      
