workflows:
  android-debug:
    name: Build JMAP Android APK
    instance_type: mac_mini_m2
    scripts:
      - name: Create fake .env file to bypass AI Studio requirement
        script: echo "GEMINI_API_KEY=dummy_key_for_build" > .env
      - name: Generate correct Gradle Wrapper (v9.3.1)
        script: gradle wrapper --gradle-version 9.3.1
      - name: Make Gradle executable
        script: chmod +x gradlew
      - name: Build Debug APK
        script: ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/**/*.apk
      
